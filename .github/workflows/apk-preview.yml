name: APK im Android Emulator testen

on:
  workflow_dispatch:

jobs:
  run-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Repo laden
        uses: actions/checkout@v4

      - name: KVM für Android Emulator aktivieren
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: APK im Emulator starten und Screenshot machen
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            APK="$(find . -name '*.apk' | head -n 1)"
            echo "APK gefunden: $APK"

            AAPT="$(find $ANDROID_HOME/build-tools -name aapt | sort | tail -n 1)"
            PACKAGE="$($AAPT dump badging "$APK" | sed -n "s/package: name='\([^']*\)'.*/\1/p")"

            echo "Package: $PACKAGE"

            adb install -r "$APK"
            adb shell monkey -p "$PACKAGE" -c android.intent.category.LAUNCHER 1
            sleep 8

            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshot.png

            adb shell screenrecord --time-limit 10 /sdcard/demo.mp4 || true
            adb pull /sdcard/demo.mp4 demo.mp4 || true

      - name: Screenshot und Video hochladen
        uses: actions/upload-artifact@v4
        with:
          name: apk-preview
          path: |
            screenshot.png
            demo.mp4
